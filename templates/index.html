<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikacja Pogodowa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            background: #f0f4f8;
            color: #333;
        }
        h1 { color: #2c5f8a; }
        select, button {
            padding: 10px 16px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        button {
            background: #2c5f8a;
            color: white;
            border: none;
            margin-left: 8px;
        }
        .weather-card {
            margin-top: 30px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .error { color: red; margin-top: 16px; }
    </style>
</head>
<body>
<h1>🌤 Aplikacja Pogodowa</h1>

<form method="POST" action="/">
    <label for="city">Wybierz miasto:</label><br>
    <select name="city" id="city">
        {{range .Cities}}
        <option value="{{.}}">{{.}}</option>
        {{end}}
    </select>
    <button type="submit">Sprawdź pogodę</button>
</form>

{{if .Error}}
<p class="error">❌ {{.Error}}</p>
{{end}}

{{if .Weather}}
<div class="weather-card">
    <h2>📍 {{.Weather.City}}, {{.Weather.Country}}</h2>
    <p>🌡 Temperatura: <strong>{{.Weather.Temperature}}°C</strong></p>
    <p>💨 Prędkość wiatru: <strong>{{.Weather.WindSpeed}} km/h</strong></p>
    <p>☁ Stan nieba: <strong>{{.Weather.Description}}</strong></p>
</div>
{{end}}
</body>
</html>
